apiVersion: 1

providers:
  - name: 'HealOps Dashboards'
    orgId: 1
    folder: 'HealOps'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards/healops
      foldersFromFilesStructure: false

  - name: 'InfraStream Dashboards'
    orgId: 1
    folder: 'InfraStream'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards/infrastream
      foldersFromFilesStructure: false
