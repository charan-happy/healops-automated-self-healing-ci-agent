# ─────────────────────────────────────────────────────────────────
# HealOps — Production Docker Compose (EC2 Deployment)
# ─────────────────────────────────────────────────────────────────
# Uses:
#   - AWS RDS for PostgreSQL (NOT a local container)
#   - AWS ElastiCache for Redis (NOT a local container)
#   - Pre-built GHCR images for backend/worker/frontend
#
# Start:  docker compose -f docker-compose-prod.yml up -d
# Logs:   docker compose -f docker-compose-prod.yml logs -f backend
# ─────────────────────────────────────────────────────────────────

name: healops

services:

  # ───────────────────────────────
  # NestJS Backend API
  # ───────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    container_name: healops_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - healops_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ───────────────────────────────
  # NestJS Worker (BullMQ Processor)
  # ───────────────────────────────
  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    container_name: healops_worker
    restart: unless-stopped
    command: ["node", "dist/worker.main.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - healops_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ───────────────────────────────
  # Next.js Frontend
  # ───────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-frontend:latest}
    container_name: healops_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${HEALOPS_PUBLIC_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${HEALOPS_PUBLIC_WS_URL:-ws://localhost:4000}
      NEXTAUTH_SECRET: ${JWT_SECRET:-change_me}
      NEXTAUTH_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healops_network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ───────────────────────────────
  # Observability (optional profile)
  # Start with: docker compose -f docker-compose-prod.yml --profile observability up -d
  # ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: healops_prometheus
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./apm/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - healops_network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: healops_grafana
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - healops_network

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: healops_jaeger
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - healops_network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  healops_network:
    driver: bridge
