# ─────────────────────────────────────────────────────────────────────────────
# HealOps Production Docker Compose  (runs on EC2)
# PostgreSQL → AWS RDS (managed, NOT here)
# Redis      → Docker on EC2 (this file)
# Images     → pulled from GHCR
#
# Usage:
#   BACKEND_IMAGE=ghcr.io/deepanshugoyal10/healops-backend:sha-abc1234 \
#   docker compose -f docker-compose-prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── NestJS Backend API ─────────────────────────────────────────────────────
  # Architecture: src/main.ts — HTTP server on port 4000
  # Endpoints: POST /v1/healops/webhooks/github, /health, /metrics, /api/v1
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    container_name: healops-backend
    restart: unless-stopped
    ports:
      - "4000:4000"                  # ✅ Backend API port — NOT 3000
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - healops
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]  # ✅ /health is VERSION_NEUTRAL
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s              # RDS cold connection needs more time

  # ── NestJS Worker (BullMQ Processor) ───────────────────────────────────────
  # Architecture: src/worker.main.ts — RepairJobsProcessor
  # CRITICAL: This is a SEPARATE process — same image, different CMD
  # Processes healops-repair queue jobs (LangGraph agent runs here)
  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    container_name: healops-worker
    restart: unless-stopped
    command: ["node", "dist/worker.main.js"]   # ✅ worker entrypoint
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy   # Worker starts after API is ready
    networks:
      - healops

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  # Architecture: Next.js standalone build on port 3000
  # Browser-side API calls go to backend:4000
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-frontend:latest}
    container_name: healops-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - healops
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis (BullMQ queue + cache) ───────────────────────────────────────────
  # Architecture: healops-repair queue, AOF persistence
  # ElastiCache is used in full production; Docker Redis used on EC2 single-node
  redis:
    image: redis:7-alpine
    container_name: healops-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healops
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Architecture: /metrics endpoint scraped by Prometheus
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: healops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./apm/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - healops

  # ── Grafana ────────────────────────────────────────────────────────────────
  # Architecture: Grafana dashboards on port 3001
  grafana:
    image: grafana/grafana:11.1.0
    container_name: healops-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./apm/grafana/provisioning:/etc/grafana/provisioning  # ✅ provisioning mount
    networks:
      - healops

  # ── Jaeger (Distributed Tracing) ───────────────────────────────────────────
  # Architecture: OpenTelemetry traces via /tracing endpoint
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: healops-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - healops

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  healops:
    driver: bridge