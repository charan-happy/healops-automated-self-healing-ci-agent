# ─────────────────────────────────────────────────────────────────
# HealOps — Full Stack Docker Compose
# Mirrors EXACT same environment used in GitHub Actions runner
# Images pulled from GHCR for local/sandbox parity
# ─────────────────────────────────────────────────────────────────

name: healops

services:

  # ───────────────────────────────
  # PostgreSQL 17 + pgvector
  # Architecture: pgvector 1536-dim HNSW index, 21 tables
  # ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17            # ✅ pg17 — matches RDS + CI + ARCHITECTURE.md
    container_name: healops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-healops_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healops} -d ${POSTGRES_DB:-healops_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - healops_network

  # ──────────────────────��────────
  # Redis 7 (BullMQ queue + cache)
  # Architecture: healops-repair queue, AOF persistence
  # ───────────────────────────────
  redis:
    image: redis:7-alpine                    # ✅ pinned
    container_name: healops_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healops_network

  # ───────────────────────────────
  # NestJS Backend API
  # Architecture: POST /v1/healops/webhooks/github, port 4000
  # Entrypoint: src/main.ts
  # ───────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    build:
      context: .
      dockerfile: Docker/dockerfile.backend  # ✅ correct path
      target: runner
    container_name: healops_backend
    restart: unless-stopped
    ports:
      - "4000:4000"                          # ✅ port 4000 — matches ARCHITECTURE.md
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000

      # Database — RDS in prod, local postgres in dev
      DATABASE_URL: postgresql://${POSTGRES_USER:-healops}:${POSTGRES_PASSWORD:-healops_secret}@postgres:5432/${POSTGRES_DB:-healops_db}

      # Redis — ElastiCache in prod, local redis in dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379

      # AI (OpenRouter → Claude Sonnet)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-5}

      # GitHub App
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}

      # Internal
      HEALOPS_PUBLIC_URL: ${HEALOPS_PUBLIC_URL:-http://localhost:4000}
      HEALOPS_WEBHOOK_API_KEY: ${HEALOPS_WEBHOOK_API_KEY:-dev_webhook_key}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      CORS_ORIGINS: http://localhost:3000,http://localhost:4000,http://frontend:3000
      FRONTEND_URL: http://frontend:3000

      # Slack
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-#eng-healops}

      # Agent tuning
      AGENT_MAX_RETRIES: ${AGENT_MAX_RETRIES:-3}
      AGENT_MIN_CONFIDENCE: ${AGENT_MIN_CONFIDENCE:-0.55}
      AGENT_TOKEN_BUDGET_PER_JOB: ${AGENT_TOKEN_BUDGET_PER_JOB:-100000}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]  # ✅ /health is VERSION_NEUTRAL
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - healops_network

  # ───────────────────────────────
  # NestJS Worker (BullMQ Processor)
  # Architecture: worker.main.ts — RepairJobsProcessor
  # CRITICAL: This is a SEPARATE process from the API
  # ───────────────────────────────
  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-backend:latest}
    build:
      context: .
      dockerfile: Docker/dockerfile.backend
      target: runner
    container_name: healops_worker
    restart: unless-stopped
    command: ["node", "dist/worker.main.js"]   # ✅ worker entrypoint
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Same env vars as backend — shared image, different entrypoint
      DATABASE_URL: postgresql://${POSTGRES_USER:-healops}:${POSTGRES_PASSWORD:-healops_secret}@postgres:5432/${POSTGRES_DB:-healops_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-5}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      HEALOPS_PUBLIC_URL: ${HEALOPS_PUBLIC_URL:-http://localhost:4000}
      HEALOPS_WEBHOOK_API_KEY: ${HEALOPS_WEBHOOK_API_KEY:-dev_webhook_key}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      AGENT_MAX_RETRIES: ${AGENT_MAX_RETRIES:-3}
      AGENT_MIN_CONFIDENCE: ${AGENT_MIN_CONFIDENCE:-0.55}
      AGENT_TOKEN_BUDGET_PER_JOB: ${AGENT_TOKEN_BUDGET_PER_JOB:-100000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - healops_network

  # ───────────────────────────────
  # Next.js Frontend
  # Architecture: port 3000
  # ───────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/deepanshugoyal10/healops-frontend:latest}
    build:
      context: .
      dockerfile: Docker/dockerfile.frontend  # ✅ correct path + name
      target: runner
    container_name: healops_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000   # Browser-side — hits backend API
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-nextauth_secret}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healops_network

  # ───────────────────────────────
  # Observability Stack (dev profile)
  # Architecture: Prometheus + Grafana + Jaeger + Loki
  # Start with: docker compose --profile observability up
  # ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0           # ✅ pinned
    container_name: healops_prometheus
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./apps/backend/apm/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - healops_network

  grafana:
    image: grafana/grafana:10.4.0            # ✅ pinned
    container_name: healops_grafana
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./apps/backend/apm/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - healops_network

  jaeger:
    image: jaegertracing/all-in-one:1.56     # ✅ pinned
    container_name: healops_jaeger
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
    networks:
      - healops_network

  # ───────────────────────────────
  # pgAdmin (dev profile only)
  # ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.5                # ✅ pinned
    container_name: healops_pgadmin
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@healops.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healops_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  healops_network:
    driver: bridge